<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Contact form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="success-toast" id="successToast" role="alert" aria-hidden="true">
    <div class="toast-header">
      <img src="./assets/images/icon-success.svg" alt="" class="success-icon">
      <strong>Message Sent!</strong>
    </div>
    <p>Thanks for completing the form. We'll be in touch soon!</p>
  </div>
  <main class="form-container">
    <h1>Contact Us</h1>
    <form id="contactForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input type="text" id="firstName" name="firstName" required>
          <span class="error-message" id="firstNameError">This field is required</span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" name="lastName" required>
          <span class="error-message" id="lastNameError">This field is required</span>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" required>
        <span class="error-message" id="emailError">Please enter a valid email address</span>
      </div>
      <div class="form-group">
        <label class="radio-card" for="queryGeneral">
          <input type="radio" id="queryGeneral" name="queryType" value="general" required>
          <span class="custom-radio"></span>
          General Enquiry
        </label>
        <label class="radio-card">
          <input type="radio" id="queryGeneral" name="queryType" value="general" required>
          <span class="custom-radio"></span>
          General Enquiry
        </label>
        </div>
        <span class="error-message" id="queryTypeError">Please select a query type</span>
      </div>
      <div class="form-group">
        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <span class="error-message" id="messageError">This field is required</span>
      </div>
      <div class="form-group checkbox-group">
        <label class="checkbox-container" for="consent">
          <input type="checkbox" id="consent" name="consent" required>
          <span class="custom-checkbox"></span>
          I consent to being contacted by the team <span class="required">*</span>
        </label>
        <span class="error-message" id="consentError">To submit this form, please consent to being contacted</span>
      </div>
      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </main>
  <script>
    const form = document.getElementById('contactForm');
    const toast = document.getElementById('successToast');
    const radioCards = document.querySelectorAll('.radio-card');
    radioCards.forEach(card => {
      const input = card.querySelector('input[type="radio"]');
      input.addEventListener('change', () => {
        radioCards.forEach(c => c.classList.remove('active'));
        if (input.checked) {
          card.classList.add('active');
        }
      });
    });
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let isValid = true;
      const firstName = document.getElementById('firstName');
      if (!firstName.value.trim()) {
        showError(firstName, 'firstNameError');
        isValid = false;
      } else {
        clearError(firstName, 'firstNameError');
      }
      const lastName = document.getElementById('lastName');
      if (!lastName.value.trim()) {
        showError(lastName, 'lastNameError');
        isValid = false;
      } else {
        clearError(lastName, 'lastNameError');
      }
      const email = document.getElementById('email');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email.value.trim() || !emailRegex.test(email.value)) {
        showError(email, 'emailError');
        isValid = false;
      } else {
        clearError(email, 'emailError');
      }
      const queryTypeSelected = document.querySelector('input[name="queryType"]:checked');
      const queryTypeError = document.getElementById('queryTypeError');
      if (!queryTypeSelected) {
        queryTypeError.style.display = 'block';
        isValid = false;
      } else {
        queryTypeError.style.display = 'none';
      }
      const message = document.getElementById('message');
      if (!message.value.trim()) {
        showError(message, 'messageError');
        isValid = false;
      } else {
        clearError(message, 'messageError');
      }
      const consent = document.getElementById('consent');
      const consentError = document.getElementById('consentError');
      if (!consent.checked) {
        consentError.style.display = 'block';
        isValid = false;
      } else {
        consentError.style.display = 'none';
      }
      if (isValid) {
        toast.classList.add('show');
        toast.setAttribute('aria-hidden', 'false');
        form.reset();
        radioCards.forEach(c => c.classList.remove('active'));
        setTimeout(() => {
          toast.classList.remove('show');
          toast.setAttribute('aria-hidden', 'true');
        }, 5000);
      }
    });
    function showError(inputElement, errorId) {
      inputElement.classList.add('input-error');
      document.getElementById(errorId).style.display = 'block';
    }
    function clearError(inputElement, errorId) {
      inputElement.classList.remove('input-error');
      document.getElementById(errorId).style.display = 'none';
    }
  </script>
</body>
</html>
